services:
  sistema-tickets-web:
    container_name: sistema-tickets-web
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
      - "${STORYBOOK_PORT:-6006}:${STORYBOOK_PORT:-6006}"
    env_file:
      - .env
